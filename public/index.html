<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Boekhouding overzicht</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f3f5f7; --nav: #154273; --nav2: #1d5891; --card: #ffffff;
        --ink: #1c1c1c; --muted: #5b6670; --accent: #007bc7; --accent2: #01689b;
        --accent-tint: #d9ebf7; --pos: #39870c; --neg: #d52b1e; --warn: #ffb612;
        --line: #c9d2da; --rail: 64px;
      }
      * { box-sizing: border-box; }
      html { font-size: 15px; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg); color: var(--ink);
        font-family: 'Source Sans 3', 'RO Sans', system-ui, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
      }
      .mono { font-variant-numeric: tabular-nums; }
      a { color: var(--hemel); }

      .app { display: flex; min-height: 100vh; }

      .rail {
        width: var(--rail); background: var(--nav);
        display: flex; flex-direction: column; align-items: center;
        padding: 14px 0; gap: 4px; position: sticky; top: 0; height: 100vh;
        flex-shrink: 0; z-index: 20;
      }
      .brand {
        width: 34px; height: 34px; border-radius: 3px; background: #fff; color: var(--nav);
        display: grid; place-items: center; font-weight: 700; margin-bottom: 12px; font-size: 15px;
      }
      .rail-item {
        position: relative; width: 44px; height: 44px; border-radius: 3px;
        display: grid; place-items: center; color: rgba(255,255,255,0.75);
        cursor: pointer; border: none; background: none; transition: background .15s, color .15s;
      }
      .rail-item:hover { color: #fff; background: rgba(255,255,255,0.10); }
      .rail-item.active { color: #fff; background: var(--accent); }
      .rail-item.active::before {
        content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 4px;
        background: var(--hemel); border-radius: 0 2px 2px 0;
      }
      .flyout {
        position: absolute; left: calc(100% + 12px); top: -2px;
        background: var(--nav); border-radius: 4px; padding: 10px;
        min-width: 190px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        opacity: 0; transform: translateX(-6px); pointer-events: none;
        transition: opacity .15s ease, transform .15s ease; z-index: 40;
      }
      .rail-item:hover .flyout { opacity: 1; transform: translateX(0); pointer-events: auto; }
      .flyout h4 { margin: 2px 4px 8px; font-size: 12px; color: #fff; }
      .flyout button {
        display: block; width: 100%; text-align: left; padding: 7px 9px; border-radius: 3px;
        border: none; background: none; color: rgba(255,255,255,0.8); font-size: 12px; cursor: pointer; font-family: inherit;
      }
      .flyout button:hover { background: var(--nav2); color: #fff; }

      .main { flex: 1; padding: 20px 22px 30px; max-width: 1080px; width: 100%; margin: 0 auto; }
      .topbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--nav); }
      .pagetitle { font-size: 18px; font-weight: 700; color: var(--nav); }
      .seg { display: inline-flex; background: #fff; border: 1px solid var(--line); border-radius: 3px; overflow: hidden; }
      .seg button {
        border: none; background: none; padding: 6px 11px;
        font-size: 12px; cursor: pointer; color: var(--nav); font-family: inherit; font-weight: 600;
        border-right: 1px solid var(--line);
      }
      .seg button:last-child { border-right: none; }
      .seg button.on { background: var(--accent); color: #fff; }
      .topacties { margin-left: auto; display: flex; align-items: center; gap: 8px; }
      .sync {
        display: inline-grid; place-items: center; width: 34px; height: 34px;
        border: 1px solid var(--groen); background: var(--groen); color: #fff; border-radius: 3px; cursor: pointer;
      }
      .sync:hover { background: var(--groen-dk); }
      .sync:disabled { opacity: .6; cursor: wait; }
      .spin { animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .statushub { position: relative; }
      .st-indicator {
        width: 34px; height: 34px; border-radius: 3px; border: 1px solid var(--line);
        background: #fff; display: grid; place-items: center; cursor: pointer;
      }
      .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
      .st-card {
        position: absolute; right: 0; top: calc(100% + 8px); z-index: 50;
        background: var(--card); border: 1px solid var(--line); border-radius: 4px;
        padding: 14px; width: 330px; box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      }
      .st-titel { font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--nav); font-weight: 700; margin-bottom: 10px; }
      .st-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--line-licht); }
      .st-row:first-of-type { border-top: none; }
      .st-info { flex: 1; min-width: 0; }
      .st-naam { font-size: 13px; font-weight: 600; }
      .st-detail { font-size: 11px; color: var(--muted); overflow-wrap: anywhere; }
      .ghost2 { background: #fff; border: 1px solid var(--hemel); color: var(--hemel); }
      .ghost2:hover { background: var(--hemel); color: #fff; }
      .scanbtn {
        margin-top: 12px; width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 7px;
        border: 1px solid var(--groen); background: var(--groen); color: #fff;
        padding: 9px 12px; border-radius: 3px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600;
      }
      .scanbtn:hover { background: var(--groen-dk); }
      .scanbtn:disabled { opacity: .6; cursor: wait; }

      .bento { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: 4px; padding: 16px; }
      .metric { display: flex; flex-direction: column; align-items: flex-start; }
      .metric-icon {
        width: 34px; height: 34px; border-radius: 3px; display: grid; place-items: center;
        background: rgba(0,123,199,0.10); color: var(--hemel); margin-bottom: 10px;
      }
      .metric-label { font-size: 12px; color: var(--muted); }
      .metric-value { font-size: 22px; font-weight: 700; margin-top: 2px; color: var(--nav); }
      .klik { cursor: pointer; font-family: inherit; text-align: left; }
      .klik:hover { border-color: var(--hemel); }
      .klik.sel { border-color: var(--hemel); box-shadow: 0 0 0 1px var(--hemel) inset; }

      .donuts { display: flex; gap: 26px; flex-wrap: wrap; justify-content: space-around; }
      .donutwrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
      .donut-title { font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--nav); font-weight: 700; }
      .legend { display: flex; flex-direction: column; gap: 3px; width: 100%; max-width: 240px; }
      .legend-row { display: flex; align-items: center; gap: 7px; font-size: 12px; }
      .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
      .legend-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .legend-val { color: var(--muted); }

      .tabelcard { margin-bottom: 14px; padding: 12px 14px; overflow-x: auto; }
      .tabel-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
      .tabel-titel { font-size: 13px; font-weight: 700; color: var(--nav); }
      .tx-samenvatting { display: flex; gap: 16px; font-size: 13px; margin-bottom: 8px; font-weight: 600; }
      .tx-samenvatting .in { color: var(--pos); }
      .tx-samenvatting .uitv { color: var(--neg); }

      table.tx { width: 100%; border-collapse: collapse; font-size: 12.5px; }
      table.tx th { text-align: left; color: var(--nav); font-weight: 700; padding: 7px 6px; border-bottom: 2px solid var(--nav); font-size: 11px; letter-spacing: .03em; text-transform: uppercase; }
      table.tx td { padding: 7px 6px; border-bottom: 1px solid var(--line-licht); vertical-align: middle; }
      table.tx tr:last-child td { border-bottom: none; }
      table.tx .r { text-align: right; }
      table.tx .c { text-align: center; }
      table.tx .nw { white-space: nowrap; }
      table.tx .ell { max-width: 170px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      tr.focus td { background: rgba(0,123,199,0.10); }
      .amt-pos { color: var(--pos); }
      .amt-neg { color: var(--neg); }
      .empty { color: var(--muted); text-align: center; padding: 22px 10px; font-size: 13px; }

      .icobtn {
        display: inline-grid; place-items: center; width: 26px; height: 26px; border-radius: 3px;
        border: none; background: none; cursor: pointer; color: var(--muted);
      }
      .icobtn.ok { color: var(--pos); }
      .icobtn.fout { color: var(--neg); }
      .icobtn.dim { color: rgba(83,83,83,0.4); cursor: default; }
      a.icobtn { color: var(--hemel); }
      a.icobtn:hover { color: var(--nav); }

      .chip { font-size: 11px; border-radius: 3px; padding: 2px 8px; font-weight: 600; }
      .chip.groen { color: #fff; background: var(--groen); }
      .chip.amber { color: #fff; background: var(--oranje); }
      .chip.grijs { color: #fff; background: var(--muted); }
      .mini {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 5px 10px; border-radius: 3px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600;
      }
      .mini:disabled { opacity: .6; cursor: wait; }

      .fold { border: 1px solid var(--line); border-radius: 4px; background: var(--card); overflow: hidden; margin-bottom: 12px; }
      .fold-head { display: flex; align-items: center; gap: 10px; padding: 13px 15px; cursor: pointer; font-weight: 700; font-size: 14px; user-select: none; color: var(--nav); }
      .fold-head .chev { margin-left: auto; transition: transform .2s; color: var(--muted); }
      .fold.open .fold-head .chev { transform: rotate(180deg); }
      .fold-body { padding: 0 15px 15px; }

      @media (max-width: 820px) {
        html { font-size: 14px; }
        :root { --rail: 52px; }
        .rail { padding: 12px 0; }
        .brand { width: 30px; height: 30px; font-size: 13px; }
        .rail-item { width: 38px; height: 38px; }
        .flyout { display: none; }
        .main { padding: 14px 10px 24px; }
        .topbar { gap: 7px; margin-bottom: 12px; }
        .pagetitle { width: 100%; }
        .bento { grid-template-columns: repeat(2, 1fr); gap: 9px; }
        .card { padding: 12px; }
        .metric-value { font-size: 19px; }
        .metric-icon { width: 30px; height: 30px; margin-bottom: 8px; }
        .donuts { gap: 14px; }
        .st-card { width: min(330px, calc(100vw - 24px)); }
        table.tx .ell { max-width: 110px; }
      }
      @media (prefers-reduced-motion: reduce) { * { transition: none !important; } .spin { animation: none !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/bundle.js"></script>
  </body>
</html>
