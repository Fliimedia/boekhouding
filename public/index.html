<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Boekhouding overzicht</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #F2EFE6;
        --nav: #0E2A22;
        --nav2: #163A2E;
        --card: #FCFAF4;
        --ink: #16241F;
        --muted: #5E6B64;
        --accent: #B4823C;
        --pos: #2E7D5B;
        --neg: #B4462E;
        --line: rgba(20, 36, 31, 0.09);
        --rail: 72px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: 'IBM Plex Sans', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

      .app { display: flex; min-height: 100vh; }

      .rail {
        width: var(--rail);
        background: var(--nav);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 18px 0;
        gap: 4px;
        position: sticky;
        top: 0;
        height: 100vh;
        flex-shrink: 0;
        z-index: 20;
      }
      .brand {
        width: 38px; height: 38px; border-radius: 11px;
        background: var(--accent); color: var(--nav);
        display: grid; place-items: center; font-weight: 700; margin-bottom: 14px;
        font-family: 'IBM Plex Mono', monospace;
      }
      .rail-item {
        position: relative;
        width: 46px; height: 46px; border-radius: 13px;
        display: grid; place-items: center;
        color: rgba(255,255,255,0.62);
        cursor: pointer; border: none; background: none;
        transition: background .2s, color .2s;
      }
      .rail-item:hover { color: #fff; background: rgba(255,255,255,0.06); }
      .rail-item.active { color: #fff; background: var(--nav2); }
      .rail-item.active::after {
        content: ''; position: absolute; right: -13px; top: 50%; transform: translateY(-50%);
        width: 3px; height: 22px; background: var(--accent); border-radius: 2px;
      }
      .flyout {
        position: absolute; left: calc(100% + 12px); top: -2px;
        background: var(--nav); border-radius: 15px; padding: 13px;
        min-width: 210px; box-shadow: 0 16px 40px rgba(0,0,0,0.28);
        opacity: 0; transform: translateX(-6px); pointer-events: none;
        transition: opacity .18s ease, transform .18s ease; z-index: 40;
      }
      .rail-item:hover .flyout { opacity: 1; transform: translateX(0); pointer-events: auto; }
      .flyout h4 { margin: 2px 4px 10px; font-size: 13px; color: #fff; letter-spacing: .01em; }
      .flyout button {
        display: block; width: 100%; text-align: left;
        padding: 8px 9px; border-radius: 9px; border: none; background: none;
        color: rgba(255,255,255,0.72); font-size: 13px; cursor: pointer;
        font-family: inherit;
      }
      .flyout button:hover { background: var(--nav2); color: #fff; }

      .main { flex: 1; padding: 30px 34px; max-width: 1180px; width: 100%; }
      .topbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
      .seg { display: inline-flex; background: #fff; border: 1px solid var(--line); border-radius: 11px; padding: 3px; }
      .seg button {
        border: none; background: none; padding: 7px 13px; border-radius: 8px;
        font-size: 13px; cursor: pointer; color: var(--muted); font-family: inherit; font-weight: 500;
      }
      .seg button.on { background: var(--nav); color: #fff; }
      .sync {
        margin-left: auto; display: inline-flex; align-items: center; gap: 7px;
        border: 1px solid var(--nav); background: var(--nav); color: #fff;
        padding: 8px 14px; border-radius: 11px; font-size: 13px; cursor: pointer;
        font-family: inherit; font-weight: 500;
      }
      .sync:disabled { opacity: .6; cursor: wait; }
      .status { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

      .bento { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
      .card {
        background: var(--card); border: 1px solid var(--line); border-radius: 18px;
        padding: 20px; position: relative;
      }
      .card.span2 { grid-column: span 2; }
      .card.hero {
        grid-column: span 4; grid-row: span 2; padding: 0; overflow: hidden;
        min-height: 268px; border: none;
      }
      .hero-art { position: absolute; inset: 0; }
      .hero-copy {
        position: absolute; left: 24px; bottom: 22px; right: 24px; color: #fff; z-index: 2;
      }
      .hero-copy .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; opacity: .82; }
      .hero-copy .big { font-size: 34px; font-weight: 600; margin-top: 6px; }
      .metric-icon {
        width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center;
        background: rgba(180,130,60,0.12); color: var(--accent); margin-bottom: 14px;
      }
      .metric-label { font-size: 13px; color: var(--muted); }
      .metric-value { font-size: 24px; font-weight: 600; margin-top: 3px; }

      .folds { margin-top: 18px; display: flex; flex-direction: column; gap: 12px; }
      .fold { border: 1px solid var(--line); border-radius: 15px; background: var(--card); overflow: hidden; }
      .fold-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 18px; cursor: pointer; font-weight: 600; font-size: 15px; user-select: none;
      }
      .fold-head .chev { transition: transform .2s; color: var(--muted); }
      .fold.open .fold-head .chev { transform: rotate(180deg); }
      .fold-body { padding: 0 18px 18px; }

      table.tx { width: 100%; border-collapse: collapse; font-size: 13px; }
      table.tx th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px 6px; border-bottom: 1px solid var(--line); }
      table.tx td { padding: 9px 6px; border-bottom: 1px solid rgba(20,36,31,0.05); }
      .amt-pos { color: var(--pos); }
      .amt-neg { color: var(--neg); }
      .empty { color: var(--muted); text-align: center; padding: 26px 10px; font-size: 14px; }

      @media (max-width: 820px) {
        :root { --rail: 0px; }
        .app { flex-direction: column; }
        .rail {
          width: 100%; height: 64px; flex-direction: row; padding: 0 8px;
          justify-content: space-around; position: fixed; bottom: 0; top: auto;
          border-top: 1px solid rgba(255,255,255,0.08);
        }
        .brand { display: none; }
        .flyout { display: none; }
        .rail-item.active::after { right: 50%; bottom: -2px; top: auto; transform: translateX(50%); width: 22px; height: 3px; }
        .main { padding: 20px 16px 84px; }
        .bento { grid-template-columns: 1fr; }
        .card.hero { grid-column: auto; grid-row: auto; min-height: 200px; }
        .card.span2 { grid-column: auto; }
        .hero-copy .big { font-size: 28px; }
      }
      @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/bundle.js"></script>
  </body>
</html>
